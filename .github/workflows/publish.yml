name: Publish Workspaces to NPM

on:
  release:
    types: [ published ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Publish React Package with Provenance
        run: |
          cd packages/react
          npm publish --access public --//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }} --provenance