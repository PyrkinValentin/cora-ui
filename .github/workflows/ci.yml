name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build library
        run: npm run build:lib
      - name: Type-check & build demo app
        run: npm run build -w @cora-ui/web
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test --workspaces --if-present
